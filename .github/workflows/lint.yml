# GitHub Actions Workflow: Lint and Format Checks
#
# Purpose:
#   Automated linting and code formatting validation for pull requests.
#   Ensures code quality standards are met before merging.
#
# Triggers:
#   - pull_request: Runs on all branch pull requests
#
# Jobs:
#
#   lint:
#     - Runs flake8 style checker on Python code
#     - Container: Python 2.7.18 (slim image)
#     - Installs lint requirements from pip
#     - Executes flake8 linting checks
#
#   format:
#     - Validates Python code formatting standards
#     - Runtime: Python 3.10 (via setup-python action)
#     - Uses pre-commit framework with Black formatter
#     - Note: Black requires Python 3.6+ (incompatible with Python 2.7)
#     - Current: Runs Black check only (not fixing)
#     - TODO: Uncomment "black --fix" to auto-format on pull request
#
# Permissions:
#   - Minimal permissions granted (contents: read only)
#   - No write access to repository
#
# Action Versions:
#   - checkout@v6.0.1
#   - setup-python@v6.2.0

name: Lint
run-name: Lint checks

on:
  pull_request:
    branches: ["**"]

permissions: {}

jobs:
  lint:
    permissions:
      contents: read

    name: Lint
    runs-on: ["ubuntu-latest"]
    container:
      image: python:2.7.18-slim

    steps:
      - name: Repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Requirements
        shell: bash
        working-directory: ./
        run: python -m pip install -r requirements/generated/requirements-lint.txt

      - name: Flake8
        shell: bash
        working-directory: ./
        run: python -m flake8

  format:
    permissions:
      contents: read

    name: Format
    runs-on: ["ubuntu-latest"]

    steps:
      - name: Repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.10"

      - name: Requirements
        shell: bash
        working-directory: ./
        run: python -m pip install pre-commit

        # Black does not support Python 2.7 at all.
        # Black requires Python 3.6+ as a minimum version.
      - name: Black
        shell: bash
        working-directory: ./
        # Fix formatting and change to below CLI
        # run: pre-commit run --all-files black
        run: pre-commit run black
