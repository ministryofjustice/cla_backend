name: Deploy to Cloud Platform
description: Deploys the helm chart to a Cloud Platform Kubernetes namespace

inputs:
  namespace:
    description: Target namespace (uat, staging, training, production)
    required: true

  dynamic_hostname:
    description: Use dynamic hostname based on branch name
    required: false
    default: 'false'

  KUBE_CERT:
    required: true
  KUBE_CLUSTER:
    required: true
  KUBE_NAMESPACE:
    required: true
  KUBE_TOKEN:
    required: true

  ECR_REGISTRY_URL:
    required: true
  ECR_REPOSITORY:
    required: true

  HOST:
    required: true

  IMAGE_TAG:
    description: Image tag passed from build
    required: true

runs:
  using: composite
  steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

    - name: Authenticate with cluster
      shell: bash
      env:
        KUBE_CERT: ${{ inputs.KUBE_CERT }}
        KUBE_CLUSTER: ${{ inputs.KUBE_CLUSTER }}
        KUBE_TOKEN: ${{ inputs.KUBE_TOKEN }}
        KUBE_NAMESPACE: ${{ inputs.KUBE_NAMESPACE }}
      run: |
        echo "$KUBE_CERT" | base64 -d > ca.crt
        kubectl config set-cluster "$KUBE_CLUSTER" \
          --certificate-authority=./ca.crt \
          --server="https://$KUBE_CLUSTER"
        kubectl config set-credentials deploy-user --token="$KUBE_TOKEN"
        kubectl config set-context "$KUBE_CLUSTER" \
          --cluster="$KUBE_CLUSTER" \
          --user=deploy-user \
          --namespace="$KUBE_NAMESPACE"
        kubectl config use-context "$KUBE_CLUSTER"

    - name: Set image tag and release info
      shell: bash
      env:
        DYNAMIC_HOSTNAME: ${{ inputs.dynamic_hostname }}
        HOST: ${{ inputs.HOST }}
        ECR_REGISTRY_URL: ${{ inputs.ECR_REGISTRY_URL }}
        ECR_REPOSITORY: ${{ inputs.ECR_REPOSITORY }}
        KUBE_NAMESPACE: ${{ inputs.KUBE_NAMESPACE }}
        IMAGE_TAG_INPUT: ${{ inputs.IMAGE_TAG }}
      run: |
        BRANCH_NAME="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"

        IMAGE_TAG="$IMAGE_TAG_INPUT"

        CLEANED_BRANCH_NAME=$(echo "$BRANCH_NAME" | sed 's/^feature[-/]//' | sed 's:^\w*\/::' | tr -s ' _/[]().' '-' | tr '[:upper:]' '[:lower:]' | cut -c1-28 | sed 's/-$//')

        if [ "$DYNAMIC_HOSTNAME" = "true" ]; then
          RELEASE_NAME="${CLEANED_BRANCH_NAME}"
          RELEASE_HOST="${RELEASE_NAME}-${HOST}"
        else
          RELEASE_NAME="cla-backend"
          RELEASE_HOST="${HOST}"
        fi

        echo "IMAGE_TAG=${IMAGE_TAG}" >> "$GITHUB_ENV"
        echo "RELEASE_NAME=${RELEASE_NAME}" >> "$GITHUB_ENV"
        echo "RELEASE_HOST=${RELEASE_HOST}" >> "$GITHUB_ENV"
        echo "DOCKER_REPOSITORY=${ECR_REGISTRY_URL}/${ECR_REPOSITORY}" >> "$GITHUB_ENV"
        echo "KUBE_NAMESPACE=${KUBE_NAMESPACE}" >> "$GITHUB_ENV"

    - name: Get ingress cluster info
      shell: bash
      run: |
        echo "INGRESS_CLUSTER_NAME=$(kubectl get configmap ingress-cluster -o jsonpath='{.data.name}')" >> "$GITHUB_ENV"
        echo "INGRESS_CLUSTER_WEIGHT=$(kubectl get configmap ingress-cluster -o jsonpath='{.data.weight}')" >> "$GITHUB_ENV"

    - name: Fetch Pingdom IPs
      shell: bash
      run: |
        pip3 install requests --quiet
        PINGDOM_IPS=$(python3 bin/pingdom_ips.py)
        echo "PINGDOM_IPS=${PINGDOM_IPS}" >> "$GITHUB_ENV"

    - name: Deploy
      shell: bash
      env:
        NAMESPACE: ${{ inputs.namespace }}
        DYNAMIC_HOSTNAME: ${{ inputs.dynamic_hostname }}
      run: ./bin/${NAMESPACE}_deploy.sh "$DYNAMIC_HOSTNAME"