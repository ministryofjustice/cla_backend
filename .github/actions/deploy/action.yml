name: Deploy to Cloud Platform
description: Deploys the helm chart to a Cloud Platform Kubernetes namespace

inputs:
  namespace:
    description: Target namespace (uat, staging, training, production)
    required: true
  dynamic_hostname:
    description: Use dynamic hostname based on branch name
    required: false
    default: 'false'
  KUBE_CERT:
    description: Kubernetes cluster certificate (base64 encoded)
    required: true
  KUBE_CLUSTER:
    description: Kubernetes cluster hostname
    required: true
  KUBE_NAMESPACE:
    description: Kubernetes namespace
    required: true
  KUBE_TOKEN:
    description: Kubernetes service account token
    required: true
  ECR_REGISTRY_URL:
    description: ECR registry URL
    required: true
  ECR_REPOSITORY:
    description: ECR repository name
    required: true
  HOST:
    description: Base hostname for deployment
    required: true

runs:
  using: composite
  steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

    - name: Authenticate with cluster
      shell: bash
      run: |
        echo "${{ inputs.KUBE_CERT }}" | base64 -d > ca.crt
        kubectl config set-cluster ${{ inputs.KUBE_CLUSTER }} \
          --certificate-authority=./ca.crt \
          --server=https://${{ inputs.KUBE_CLUSTER }}
        kubectl config set-credentials deploy-user --token=${{ inputs.KUBE_TOKEN }}
        kubectl config set-context ${{ inputs.KUBE_CLUSTER }} \
          --cluster=${{ inputs.KUBE_CLUSTER }} \
          --user=deploy-user \
          --namespace=${{ inputs.KUBE_NAMESPACE }}
        kubectl config use-context ${{ inputs.KUBE_CLUSTER }}

    - name: Set image tag and release info
      shell: bash
      run: |
        BRANCH_NAME="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"
        if [ "${GITHUB_REF_NAME}" = "main" ]; then
          IMAGE_TAG="main-${GITHUB_SHA}"
        else
          IMAGE_TAG="branch-${GITHUB_SHA}"
        fi
        CLEANED_BRANCH_NAME=$(echo "$BRANCH_NAME" | sed 's/^feature[-/]//' | sed 's:^\w*\/::' | tr -s ' _/[]().' '-' | tr '[:upper:]' '[:lower:]' | cut -c1-28 | sed 's/-$//')
        if [ "${{ inputs.dynamic_hostname }}" = "true" ]; then
          RELEASE_NAME="${CLEANED_BRANCH_NAME}"
          RELEASE_HOST="${RELEASE_NAME}-${{ inputs.HOST }}"
        else
          RELEASE_NAME="cla-backend"
          RELEASE_HOST="${{ inputs.HOST }}"
        fi
        echo "IMAGE_TAG=${IMAGE_TAG}" >> "$GITHUB_ENV"
        echo "RELEASE_NAME=${RELEASE_NAME}" >> "$GITHUB_ENV"
        echo "RELEASE_HOST=${RELEASE_HOST}" >> "$GITHUB_ENV"
        echo "DOCKER_REPOSITORY=${{ inputs.ECR_REGISTRY_URL }}/${{ inputs.ECR_REPOSITORY }}" >> "$GITHUB_ENV"
        echo "KUBE_NAMESPACE=${{ inputs.KUBE_NAMESPACE }}" >> "$GITHUB_ENV"

    - name: Get ingress cluster info
      shell: bash
      run: |
        echo "INGRESS_CLUSTER_NAME=$(kubectl get configmap ingress-cluster -o jsonpath='{.data.name}')" >> "$GITHUB_ENV"
        echo "INGRESS_CLUSTER_WEIGHT=$(kubectl get configmap ingress-cluster -o jsonpath='{.data.weight}')" >> "$GITHUB_ENV"

    - name: Fetch Pingdom IPs
      shell: bash
      run: |
        pip3 install requests --quiet
        PINGDOM_IPS=$(python3 bin/pingdom_ips.py)
        echo "PINGDOM_IPS=${PINGDOM_IPS}" >> "$GITHUB_ENV"

    - name: Deploy
      shell: bash
      run: ./bin/${{ inputs.namespace }}_deploy.sh ${{ inputs.dynamic_hostname }}
