apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cla-backend.fullname" . }}-app
  labels:
    {{- include "cla-backend.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "cla-backend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "cla-backend.selectorLabels" . | nindent 8 }}
        app: web
    spec:
    {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
    {{- end }}
      serviceAccountName: {{ include "cla-backend.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      terminationGracePeriodSeconds: 30
      {{- if .Values.appWaitForDb.enabled }}
      initContainers:
        - name: wait-for-db
          image: "bitnamilegacy/postgresql:14-debian-12"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /bin/sh
            - -c
            - until pg_isready -h "${DB_HOST}" -p "${DB_PORT:-5432}" -U "${DB_USER:-postgres}" -d "${DB_NAME:-cla_backend}"; do echo "waiting for db"; sleep 2; done
          env:
            {{ include "cla-backend.app.vars" . | nindent 12 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /status/
              port: http
              httpHeaders:
                - name: Host
                  value: "{{ .Values.host }}"
          readinessProbe:
            httpGet:
              path: /status/
              port: http
              httpHeaders:
                - name: Host
                  value: "{{ .Values.host }}"
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sleep","30"]
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          env:
            {{ include "cla-backend.app.vars" . | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
    {{- end }}
    {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
    {{- end }}
---
{{- if .Values.localPostgres.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cla-backend.fullname" . }}-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ include "cla-backend.fullname" . }}-db
  template:
    metadata:
      labels:
        app: {{ include "cla-backend.fullname" . }}-db
    spec:
    {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
    {{- end }}
      serviceAccountName: {{ include "cla-backend.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ include "cla-backend.fullname" . }}-db
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "bitnamilegacy/postgresql:14-debian-12"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 5432
              protocol: TCP
          {{- if .Values.localPostgresProbes.enabled }}
          startupProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -h 127.0.0.1 -p 5432 -U postgres -d cla_backend
            periodSeconds: {{ .Values.localPostgresProbes.startup.periodSeconds }}
            timeoutSeconds: {{ .Values.localPostgresProbes.startup.timeoutSeconds }}
            failureThreshold: {{ .Values.localPostgresProbes.startup.failureThreshold }}
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -h 127.0.0.1 -p 5432 -U postgres -d cla_backend
            periodSeconds: {{ .Values.localPostgresProbes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.localPostgresProbes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.localPostgresProbes.readiness.failureThreshold }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          env:
            - name: POSTGRES_PASSWORD
              value: {{ .Values.envVars.DB_PASSWORD.value }}
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_DB
              value: cla_backend
            - name: ALLOW_EMPTY_PASSWORD
              value: "yes"
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
    {{- end }}
    {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
    {{- end }}
{{- end }}
