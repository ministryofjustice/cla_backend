name: Build and push
description: Build image and push it ECR

inputs:
  ECR_ROLE_TO_ASSUME:
    required: true
    description: ECR role to assume
  ECR_REGION:
    required: true
    description: ECR region
  ECR_REGISTRY_URL:
    required: true
    description: ECR registry url
  ECR_REPOSITORY:
    required: true
    description: ECR repository

  outputs:
    image_tag:
      value: ${{ steps.meta.outputs.tags }}

runs:
  using: composite
  steps:

    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

    - name:  Set up AWS credentials
      uses: ministryofjustice/laa-reusable-github-actions/.github/actions/ecr-auth@cb1ebcbca5efcd1e91b7ee1e27c73650c1bba9d8
      with:
        ecr_region: ${{ inputs.ECR_REGION }}
        ecr_role: ${{ inputs.ECR_ROLE_TO_ASSUME }}
        role-session-name: laa-cla-backend

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435
      with:
        install: true

    - name: Cache Docker layers
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7
      with:
        path: /tmp/.buildx-cache
        key: ${{ runner.os }}-buildx-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-buildx-
  
    - name: Docker meta
      id: meta
      uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
      with:
        images: ${{ steps.login-ecr.outputs.registry }}/${{ inputs.ECR_REPOSITORY }}
        tags: |
            type=raw,value=${{ github.ref_name == 'main' && format('main-{0}', github.sha) || format('branch-{0}', github.sha) }}

    - name: Build and push image with caching
      uses: ministryofjustice/laa-reusable-github-actions/.github/actions/build_and_push_with_cache@7c81d37978aef9418f7185d9ecf70e3cd1c63c02
      with:
       image_registry: ${{ inputs.ECR_REGISTRY_URL }}
       image_repo: ${{ inputs.ECR_REPOSITORY }}
       dockerfile_path: Dockerfile
       image_tag: ${{  steps.branch-tag.outputs.tag  }}
