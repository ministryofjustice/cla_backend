default_language_version:
  python: python3.10
repos:
  - repo: https://github.com/ministryofjustice/devsecops-hooks
    rev: v1.5.0
    hooks:
      - id: baseline
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v2.1.0
    hooks:
      - id: flake8
        # Pre-commit fails to install on apple chips as install pyyaml 5.4
        additional_dependencies: ["PyYAML==5.3.1"]
        language_version: python2.7.18
        args:
          ["--config=setup.cfg", "--exclude=./cla_backend/settings/*,./docs/*"]
  - repo: https://github.com/jazzband/pip-tools
    rev: 5.5.0
    hooks:
      - id: pip-compile
        language_version: python2.7
        additional_dependencies: ["pip==20.3.4"]
        name: pip-compile requirements-docs.in
        files: requirements-(base|docs|git).in
        args:
          [
            requirements/source/requirements-docs.in,
            "--output-file",
            requirements/generated/requirements-docs.txt
          ]
      - id: pip-compile
        language_version: python2.7
        additional_dependencies: ["pip==20.3.4"]
        name: pip-compile requirements-dev.in
        files: requirements-(base|dev|git).in
        args:
          [
            requirements/source/requirements-dev.in,
            "--output-file",
            requirements/generated/requirements-dev.txt,
          ]
      - id: pip-compile
        language_version: python2.7
        additional_dependencies: ["pip==20.3.4"]
        name: pip-compile requirements-lint.in
        files: requirements-(base|lint|git).in
        args:
          [
            "--generate-hashes",
            requirements/source/requirements-lint.in,
            "--output-file",
            requirements/generated/requirements-lint.txt,
          ]
      - id: pip-compile
        language_version: python2.7
        additional_dependencies: ["pip==20.3.4"]
        name: pip-compile requirements-testing.in
        files: requirements-(base|testing|git).in
        args:
          [
            requirements/source/requirements-testing.in,
            "--output-file",
            requirements/generated/requirements-testing.txt,
          ]
      - id: pip-compile
        language_version: python2.7
        additional_dependencies: ["pip==20.3.4"]
        name: pip-compile requirements-production.in
        files: requirements-(base|production|git).in
        args:
          [
            requirements/source/requirements-production.in,
            "--output-file",
            requirements/generated/requirements-production.txt,
          ]
